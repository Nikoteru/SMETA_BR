<div class="contracts-fragment">
    <h1>Список контрактов</h1>

    <div>
        <label>
            pId:
            <input type="number" id="contracts-pId">
        </label>
        <label>
            pLmt:
            <input type="number" id="contracts-pLmt" value="10">
        </label>

        <!-- Можно оставить для отладки, но пользователю обычно не нужен -->
        <input type="hidden" id="contracts-pFst" value="0">

        <button type="button" id="load-contracts-btn">Загрузить</button>
    </div>

    <br>

    <div id="contracts-message"></div>

    <table id="contractsTable" style="display:none;">
        <thead>
        <tr>
            <th>ID</th>
            <th>Номер договора</th>
            <th>Дата договора</th>
            <th>ID контрагента</th>
            <th>Создан</th>
            <th>Обновлён</th>
            <th>Создал пользователь</th>
            <th>Обновил пользователь</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div id="contracts-pagination" class="contracts-pagination" style="display:none;">
        <button type="button" id="contracts-first-btn" class="page-nav-btn">«</button>
        <button type="button" id="contracts-prev-btn" class="page-nav-btn">‹</button>

        <div id="contracts-pages" class="contracts-pages"></div>

        <button type="button" id="contracts-next-btn" class="page-nav-btn">›</button>
        <button type="button" id="contracts-last-btn" class="page-nav-btn">»</button>

        <span id="contracts-page-info" class="contracts-page-info"></span>
    </div>
</div>
