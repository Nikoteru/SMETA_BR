<div class="contracts-fragment">
    <h1>Список контрактов</h1>

    <div class="contracts-toolbar">
        <label>
            pId:
            <input type="number" id="contracts-pId">
        </label>

        <label>
            pLmt:
            <input type="number" id="contracts-pLmt" value="20" min="1" step="1">
        </label>

        <label>
            pFst:
            <input type="number" id="contracts-pFst" value="0" min="0" step="1">
        </label>

        <button type="button" id="load-contracts-btn">Загрузить</button>
    </div>

    <br>

    <div id="contracts-message"></div>

    <table id="contractsTable" style="display:none;">
        <thead>
        <tr>
            <th class="sortable-col" data-sort-col="id">
                <div class="th-sort-wrap">
                    <span>ID</span>
                    <span class="sort-indicator">↕</span>
                    <span class="sort-priority"></span>
                    <button type="button" class="sort-remove-btn" title="Убрать сортировку">×</button>
                </div>
            </th>

            <th class="sortable-col" data-sort-col="contract_num">
                <div class="th-sort-wrap">
                    <span>Номер договора</span>
                    <span class="sort-indicator">↕</span>
                    <span class="sort-priority"></span>
                    <button type="button" class="sort-remove-btn" title="Убрать сортировку">×</button>
                </div>
            </th>

            <th class="sortable-col" data-sort-col="contract_date">
                <div class="th-sort-wrap">
                    <span>Дата договора</span>
                    <span class="sort-indicator">↕</span>
                    <span class="sort-priority"></span>
                    <button type="button" class="sort-remove-btn" title="Убрать сортировку">×</button>
                </div>
            </th>

            <th class="sortable-col" data-sort-col="contractor_id">
                <div class="th-sort-wrap">
                    <span>ID контрагента</span>
                    <span class="sort-indicator">↕</span>
                    <span class="sort-priority"></span>
                    <button type="button" class="sort-remove-btn" title="Убрать сортировку">×</button>
                </div>
            </th>

            <th class="sortable-col" data-sort-col="create_dttm">
                <div class="th-sort-wrap">
                    <span>Создан</span>
                    <span class="sort-indicator">↕</span>
                    <span class="sort-priority"></span>
                    <button type="button" class="sort-remove-btn" title="Убрать сортировку">×</button>
                </div>
            </th>

            <th class="sortable-col" data-sort-col="update_dttm">
                <div class="th-sort-wrap">
                    <span>Обновлён</span>
                    <span class="sort-indicator">↕</span>
                    <span class="sort-priority"></span>
                    <button type="button" class="sort-remove-btn" title="Убрать сортировку">×</button>
                </div>
            </th>

            <th class="sortable-col" data-sort-col="create_user_id">
                <div class="th-sort-wrap">
                    <span>Создал пользователь</span>
                    <span class="sort-indicator">↕</span>
                    <span class="sort-priority"></span>
                    <button type="button" class="sort-remove-btn" title="Убрать сортировку">×</button>
                </div>
            </th>

            <th class="sortable-col" data-sort-col="update_user_id">
                <div class="th-sort-wrap">
                    <span>Обновил пользователь</span>
                    <span class="sort-indicator">↕</span>
                    <span class="sort-priority"></span>
                    <button type="button" class="sort-remove-btn" title="Убрать сортировку">×</button>
                </div>
            </th>
        </tr>

        <tr class="filter-row">
            <th>
                <input type="number" id="filter-id" class="filter-input" placeholder="ID">
            </th>
            <th>
                <input type="text" id="filter-contract-num" class="filter-input" placeholder="Номер">
            </th>
            <th>
                <input type="date" id="filter-contract-date" class="filter-input">
            </th>
            <th>
                <input type="number" id="filter-contractor-id" class="filter-input" placeholder="Контрагент">
            </th>
            <th>
                <input type="datetime-local" id="filter-create-dttm" class="filter-input" step="1">
            </th>
            <th>
                <input type="datetime-local" id="filter-update-dttm" class="filter-input" step="1">
            </th>
            <th>
                <input type="number" id="filter-create-user-id" class="filter-input" placeholder="Создал">
            </th>
            <th>
                <input type="number" id="filter-update-user-id" class="filter-input" placeholder="Обновил">
            </th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div id="contracts-pagination" class="contracts-pagination" style="display:none;">
        <button type="button" id="contracts-first-btn" class="page-nav-btn">«</button>
        <button type="button" id="contracts-prev-btn" class="page-nav-btn">‹</button>

        <div id="contracts-pages" class="contracts-pages"></div>

        <button type="button" id="contracts-next-btn" class="page-nav-btn">›</button>
        <button type="button" id="contracts-last-btn" class="page-nav-btn">»</button>

        <span id="contracts-page-info" class="contracts-page-info"></span>
    </div>
</div>
