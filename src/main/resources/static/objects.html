<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/layout.css">
    <title>Смета</title>
    <style>
        :root {
            --blue: #9fc5e8;
            --blue-dark: #7ea8cf;
            --line: #6f6f6f;
            --stage-bg: #efefef;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            color: #222;
        }

        .wrap {
            width: 100%;
            padding: 20px;
        }

        h1 {
            margin: 0 0 16px;
            font-size: 22px;
        }

        .table-box {
            background: #fff;
            border: 1px solid var(--line);
            overflow-x: auto;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            min-width: 1200px;
        }

        col.stage-col { width: 240px; }
        col.num-col { width: 60px; }
        col.name-col { width: auto; }
        col.unit-col { width: 90px; }
        col.price-col { width: 120px; }
        col.qty-col { width: 110px; }
        col.sum-col { width: 140px; }

        th, td {
            border: 1px solid var(--line);
            padding: 6px 8px;
            font-size: 13px;
            vertical-align: middle;
            background: var(--white);
        }

        thead th {
            background: var(--blue);
            text-align: center;
            font-weight: 700;
        }

        thead .top-group {
            background: var(--blue);
            font-size: 14px;
        }

        .stage-cell {
            background: var(--stage-bg);
            font-weight: 700;
            text-align: center;
            white-space: pre-line;
            line-height: 1.35;
        }

        .num {
            text-align: center;
        }

        .unit,
        .price,
        .qty,
        .sum {
            text-align: center;
            white-space: nowrap;
        }

        .name {
            text-align: left;
        }

        .subtotal td,
        .stage-total td,
        .global-total td,
        .final-total td {
            background: var(--blue);
            font-weight: 700;
        }

        .subtotal-label,
        .stage-total-label,
        .global-total-label,
        .final-total-label {
            text-align: left;
            padding-left: 12px;
        }

        .sum {
            font-weight: 700;
        }

        .muted {
            font-size: 12px;
            color: #555;
            margin: 10px 0 0;
        }

        .empty {
            padding: 20px;
            background: #fff;
            border: 1px solid var(--line);
        }
    </style>
</head>
<body>
<div class="app-layout">
    <div id="sidebar-placeholder"></div>

    <div class="main-area">
        <div id="header-placeholder"></div>

        <div th:replace="~{fragments/contracts :: contractsTable}"></div>
    </div>
</div>

<script src="/js/layout.js"></script>
</body>
</html>
