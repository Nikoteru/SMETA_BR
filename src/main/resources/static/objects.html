<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/layout.css">
    <title>Смета</title>
    <style>
        :root {
            --blue: #9fc5e8;
            --blue-dark: #7ea8cf;
            --line: #6f6f6f;
            --stage-bg: #efefef;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            color: #222;
        }

        .wrap {
            width: 100%;
            padding: 20px;
        }

        h1 {
            margin: 0 0 16px;
            font-size: 22px;
        }

        .table-box {
            background: #fff;
            border: 1px solid var(--line);
            overflow-x: auto;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            min-width: 1200px;
        }

        col.stage-col { width: 240px; }
        col.num-col { width: 60px; }
        col.name-col { width: auto; }
        col.unit-col { width: 90px; }
        col.price-col { width: 120px; }
        col.qty-col { width: 110px; }
        col.sum-col { width: 140px; }

        th, td {
            border: 1px solid var(--line);
            padding: 6px 8px;
            font-size: 13px;
            vertical-align: middle;
            background: var(--white);
        }

        thead th {
            background: var(--blue);
            text-align: center;
            font-weight: 700;
        }

        thead .top-group {
            background: var(--blue);
            font-size: 14px;
        }

        .stage-cell {
            background: var(--stage-bg);
            font-weight: 700;
            text-align: center;
            white-space: pre-line;
            line-height: 1.35;
        }

        .num {
            text-align: center;
        }

        .unit,
        .price,
        .qty,
        .sum {
            text-align: center;
            white-space: nowrap;
        }

        .name {
            text-align: left;
        }

        .subtotal td,
        .stage-total td,
        .global-total td,
        .final-total td {
            background: var(--blue);
            font-weight: 700;
        }

        .subtotal-label,
        .stage-total-label,
        .global-total-label,
        .final-total-label {
            text-align: left;
            padding-left: 12px;
        }

        .sum {
            font-weight: 700;
        }

        .muted {
            font-size: 12px;
            color: #555;
            margin: 10px 0 0;
        }

        .empty {
            padding: 20px;
            background: #fff;
            border: 1px solid var(--line);
        }

        .top-bar {
            padding: 16px 20px 0;
        }

        .top-bar label {
            display: inline-block;
            margin-right: 8px;
            font-size: 14px;
            font-weight: 700;
        }

        .top-bar select {
            min-width: 220px;
            padding: 8px 10px;
            font-size: 14px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #fff;
        }

        .contracts-pagination {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 16px;
            padding: 14px 16px;
            background: #ffffff;
            border: 1px solid #d7e3f0;
            border-radius: 14px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
            flex-wrap: wrap;
        }

        .contracts-pages {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .page-btn,
        .page-nav-btn {
            min-width: 38px;
            height: 38px;
            padding: 0 12px;
            border: 1px solid #c7d7e7;
            border-radius: 10px;
            background: linear-gradient(180deg, #ffffff 0%, #f2f7fc 100%);
            color: #24415c;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .page-btn:hover,
        .page-nav-btn:hover {
            transform: translateY(-1px);
            border-color: #8fb6da;
            box-shadow: 0 4px 10px rgba(126, 168, 207, 0.25);
        }

        .page-btn.active {
            background: linear-gradient(180deg, #9fc5e8 0%, #7ea8cf 100%);
            color: #ffffff;
            border-color: #6f9dc7;
            box-shadow: 0 4px 12px rgba(126, 168, 207, 0.35);
        }

        .page-btn:disabled,
        .page-nav-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .page-dots {
            min-width: 24px;
            text-align: center;
            color: #6f7f90;
            font-weight: 700;
        }

        .contracts-page-info {
            margin-left: auto;
            font-size: 13px;
            color: #4f6275;
            white-space: nowrap;
        }

        .top-bar input,
        .contracts-fragment input[type="number"] {
            min-width: 90px;
            padding: 8px 10px;
            font-size: 14px;
            border: 1px solid #b9c9d8;
            border-radius: 8px;
            background: #fff;
            margin-right: 8px;
        }

        .contracts-fragment label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-right: 10px;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 700;
        }

        .contracts-toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }

        .contracts-toolbar label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 700;
        }

        .contracts-toolbar input[type="number"] {
            min-width: 95px;
            padding: 8px 10px;
            font-size: 14px;
            border: 1px solid #b9c9d8;
            border-radius: 8px;
            background: #fff;
        }

        .contracts-toolbar button {
            padding: 9px 14px;
            border: 1px solid #7ea8cf;
            border-radius: 10px;
            background: linear-gradient(180deg, #9fc5e8 0%, #7ea8cf 100%);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .contracts-toolbar button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(126, 168, 207, 0.3);
        }

        .sortable-col {
            cursor: pointer;
            user-select: none;
            position: relative;
            transition: 0.2s ease;
        }

        .sortable-col:hover {
            filter: brightness(0.98);
        }

        .th-sort-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 28px;
        }

        .sort-indicator {
            min-width: 14px;
            font-size: 11px;
            opacity: 0.8;
        }

        .sort-priority {
            min-width: 18px;
            height: 18px;
            border-radius: 999px;
            background: #dcebf8;
            color: #24415c;
            font-size: 11px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
        }

        .sort-remove-btn {
            width: 20px;
            height: 20px;
            border: none;
            border-radius: 999px;
            background: #d9534f;
            color: #fff;
            font-size: 14px;
            line-height: 1;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            padding: 0;
        }

        .sort-remove-btn:hover {
            filter: brightness(0.95);
        }

        .sortable-col.active-sort {
            background: linear-gradient(180deg, #cfe3f7 0%, #b7d3ee 100%);
        }

        .sortable-col.sort-asc .sort-indicator,
        .sortable-col.sort-desc .sort-indicator {
            opacity: 1;
            font-weight: 700;
        }

        .contracts-pagination {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 16px;
            padding: 14px 16px;
            background: #ffffff;
            border: 1px solid #d7e3f0;
            border-radius: 14px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
            flex-wrap: wrap;
        }

        .contracts-pages {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .page-btn,
        .page-nav-btn {
            min-width: 38px;
            height: 38px;
            padding: 0 12px;
            border: 1px solid #c7d7e7;
            border-radius: 10px;
            background: linear-gradient(180deg, #ffffff 0%, #f2f7fc 100%);
            color: #24415c;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .page-btn:hover,
        .page-nav-btn:hover {
            transform: translateY(-1px);
            border-color: #8fb6da;
            box-shadow: 0 4px 10px rgba(126, 168, 207, 0.25);
        }

        .page-btn.active {
            background: linear-gradient(180deg, #9fc5e8 0%, #7ea8cf 100%);
            color: #ffffff;
            border-color: #6f9dc7;
            box-shadow: 0 4px 12px rgba(126, 168, 207, 0.35);
        }

        .page-btn:disabled,
        .page-nav-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .page-dots {
            min-width: 24px;
            text-align: center;
            color: #6f7f90;
            font-weight: 700;
        }

        .contracts-page-info {
            margin-left: auto;
            font-size: 13px;
            color: #4f6275;
            white-space: nowrap;
        }

        .filter-row th {
            background: #eef5fb;
            padding: 6px;
        }

        .filter-input {
            width: 100%;
            min-width: 0;
            padding: 7px 8px;
            font-size: 12px;
            border: 1px solid #bfd2e6;
            border-radius: 8px;
            background: #fff;
        }

        .filter-input:focus {
            outline: none;
            border-color: #7ea8cf;
            box-shadow: 0 0 0 3px rgba(126, 168, 207, 0.18);
        }

        .contracts-empty-row td {
            text-align: center;
            padding: 18px 12px;
            font-size: 14px;
            color: #5d6d7e;
            background: #f8fbfe;
            font-style: italic;
        }

        .contracts-error-row td {
            color: #b42318;
            background: #fff3f2;
        }
    </style>

</head>
<body>
<div class="app-layout">
    <div id="sidebar-placeholder"></div>

    <div class="main-area">
        <div class="top-bar">
            <label for="docType">Тип:</label>
            <select id="docType" name="docType">
                <option value="">Выберите тип</option>
                <option value="1">Договор</option>
                <option value="2">Заказчик</option>
            </select>
        </div>

        <div id="contracts-modal" style="display: none;"></div>
    </div>
</div>

<script src="/js/layout.js"></script>
<script>
    const contractsState = {
        page: 1,
        pageCount: 1,
        rowCount: 0,
        sortCols: [],
        sortDirs: [],
        filters: {
            id: '',
            contractNum: '',
            contractDate: '',
            contractorId: '',
            createDttm: '',
            updateDttm: '',
            createUserId: '',
            updateUserId: ''
        }
    };

    async function loadFragment(url, selector) {
        const response = await fetch(url);

        if (!response.ok) {
            throw new Error(`Не удалось загрузить фрагмент: HTTP ${response.status}`);
        }

        const html = await response.text();
        document.querySelector(selector).innerHTML = html;
    }

    function initSidebarActive() {
        const currentPage = (window.location.pathname.split('/').pop() || 'index.html').toLowerCase();

        document.querySelectorAll('.sidebar-menu-item').forEach(link => {
            const linkPage = (link.getAttribute('href') || '').split('/').pop().toLowerCase();
            link.classList.toggle('active', linkPage === currentPage);
        });
    }

    async function loadContracts(page = null) {
        const pLmt = Math.max(1, Number(document.getElementById('contracts-pLmt')?.value || 10));
        const pFstInput = document.getElementById('contracts-pFst');

        let pFst = Math.max(0, Number(pFstInput?.value || 0));

        if (page !== null) {
            pFst = (page - 1) * pLmt;
        }

        if (pFstInput) {
            pFstInput.value = pFst;
        }

        contractsState.page = Math.floor(pFst / pLmt) + 1;

        const params = new URLSearchParams();
        params.set('pLmt', String(pLmt));
        params.set('pFst', String(pFst));

        readContractsFiltersFromInputs();

        if (contractsState.filters.id) {
            params.set('pId', contractsState.filters.id);
        }
        if (contractsState.filters.contractNum) {
            params.set('pContractNum', contractsState.filters.contractNum);
        }
        if (contractsState.filters.contractDate) {
            params.set('pContractDate', contractsState.filters.contractDate);
        }
        if (contractsState.filters.contractorId) {
            params.set('pContractorId', contractsState.filters.contractorId);
        }
        if (contractsState.filters.createDttm) {
            params.set('pCreateDttm', contractsState.filters.createDttm);
        }
        if (contractsState.filters.updateDttm) {
            params.set('pUpdateDttm', contractsState.filters.updateDttm);
        }
        if (contractsState.filters.createUserId) {
            params.set('pCreateUserId', contractsState.filters.createUserId);
        }
        if (contractsState.filters.updateUserId) {
            params.set('pUpdateUserId', contractsState.filters.updateUserId);
        }

        contractsState.sortCols.forEach(col => params.append('pOrderCols', col));
        contractsState.sortDirs.forEach(dir => params.append('pOrderDirs', dir));

        const url = `/api/contracts?${params.toString()}`;

        const message = document.getElementById('contracts-message');
        const table = document.getElementById('contractsTable');
        const tbody = table.querySelector('tbody');
        const pagination = document.getElementById('contracts-pagination');

        message.textContent = 'Загрузка...';
        tbody.innerHTML = '';

        if (pagination) {
            pagination.style.display = 'none';
        }

        try {
            const response = await fetch(url);

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const contracts = await response.json();

            if (!contracts || contracts.length === 0) {
                contractsState.pageCount = 1;
                contractsState.rowCount = 0;

                message.textContent = 'Ничего не найдено по текущим фильтрам';
                renderContractsEmptyRow('Ничего не найдено по текущим фильтрам');

                renderContractsSortHeaders();
                return;
            }

            contracts.forEach(contract => {
                const row = document.createElement('tr');

                row.innerHTML = `
                <td>${contract.id ?? ''}</td>
                <td>${contract.contractNum ?? ''}</td>
                <td>${contract.contractDate ?? ''}</td>
                <td>${contract.contractorId ?? ''}</td>
                <td>${contract.createDttm ?? ''}</td>
                <td>${contract.updateDttm ?? ''}</td>
                <td>${contract.createUserId ?? ''}</td>
                <td>${contract.updateUserId ?? ''}</td>
            `;

                tbody.appendChild(row);
            });

            const firstRow = contracts[0];
            contractsState.pageCount = Number(firstRow.pCnt ?? 1);
            contractsState.rowCount = Number(firstRow.rCnt ?? contracts.length);

            if (contractsState.page > contractsState.pageCount) {
                contractsState.page = contractsState.pageCount;
            }

            message.textContent = '';
            table.style.display = 'table';

            renderContractsSortHeaders();
            renderContractsPagination();
        } catch (error) {
            contractsState.pageCount = 1;
            contractsState.rowCount = 0;

            message.textContent = 'Ошибка загрузки данных: ' + error.message;
            renderContractsErrorRow('Ошибка загрузки данных: ' + error.message);

            renderContractsSortHeaders();
        }
    }

    function getPageItems(currentPage, totalPages) {
        const items = [];

        if (totalPages <= 7) {
            for (let i = 1; i <= totalPages; i++) {
                items.push(i);
            }
            return items;
        }

        items.push(1);

        if (currentPage <= 4) {
            items.push(2, 3, 4, 5, '...');
        } else if (currentPage >= totalPages - 3) {
            items.push('...');
            items.push(totalPages - 4, totalPages - 3, totalPages - 2, totalPages - 1);
        } else {
            items.push('...');
            items.push(currentPage - 1, currentPage, currentPage + 1);
            items.push('...');
        }

        items.push(totalPages);

        return items;
    }

    function renderContractsPagination() {
        const pagination = document.getElementById('contracts-pagination');
        const pagesBox = document.getElementById('contracts-pages');
        const firstBtn = document.getElementById('contracts-first-btn');
        const prevBtn = document.getElementById('contracts-prev-btn');
        const nextBtn = document.getElementById('contracts-next-btn');
        const lastBtn = document.getElementById('contracts-last-btn');
        const pageInfo = document.getElementById('contracts-page-info');

        if (!pagination || !pagesBox || !firstBtn || !prevBtn || !nextBtn || !lastBtn || !pageInfo) {
            return;
        }

        if (contractsState.rowCount === 0) {
            pagination.style.display = 'none';
            return;
        }

        const currentPage = contractsState.page;
        const totalPages = contractsState.pageCount;

        pagesBox.innerHTML = '';

        const pageItems = getPageItems(currentPage, totalPages);

        pageItems.forEach(item => {
            if (item === '...') {
                const dots = document.createElement('span');
                dots.className = 'page-dots';
                dots.textContent = '...';
                pagesBox.appendChild(dots);
                return;
            }

            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'page-btn';
            btn.textContent = item;

            if (item === currentPage) {
                btn.classList.add('active');
                btn.disabled = true;
            } else {
                btn.addEventListener('click', () => loadContracts(item));
            }

            pagesBox.appendChild(btn);
        });

        firstBtn.disabled = currentPage === 1;
        prevBtn.disabled = currentPage === 1;
        nextBtn.disabled = currentPage === totalPages;
        lastBtn.disabled = currentPage === totalPages;

        firstBtn.onclick = () => loadContracts(1);
        prevBtn.onclick = () => {
            if (currentPage > 1) {
                loadContracts(currentPage - 1);
            }
        };
        nextBtn.onclick = () => {
            if (currentPage < totalPages) {
                loadContracts(currentPage + 1);
            }
        };
        lastBtn.onclick = () => loadContracts(totalPages);

        pageInfo.textContent =
            `Страница ${currentPage} из ${totalPages} • Всего записей: ${contractsState.rowCount}`;

        pagination.style.display = 'flex';
    }

    function renderContractsPagination() {
        const pagination = document.getElementById('contracts-pagination');
        const pagesBox = document.getElementById('contracts-pages');
        const firstBtn = document.getElementById('contracts-first-btn');
        const prevBtn = document.getElementById('contracts-prev-btn');
        const nextBtn = document.getElementById('contracts-next-btn');
        const lastBtn = document.getElementById('contracts-last-btn');
        const pageInfo = document.getElementById('contracts-page-info');

        if (!pagination || !pagesBox || !firstBtn || !prevBtn || !nextBtn || !lastBtn || !pageInfo) {
            return;
        }

        if (contractsState.rowCount === 0 || contractsState.pageCount <= 1) {
            pagination.style.display = 'none';
            return;
        }

        const currentPage = contractsState.page;
        const totalPages = contractsState.pageCount;

        pagesBox.innerHTML = '';

        const pageItems = getPageItems(currentPage, totalPages);

        pageItems.forEach(item => {
            if (item === '...') {
                const dots = document.createElement('span');
                dots.className = 'page-dots';
                dots.textContent = '...';
                pagesBox.appendChild(dots);
                return;
            }

            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'page-btn';
            btn.textContent = item;

            if (item === currentPage) {
                btn.classList.add('active');
                btn.disabled = true;
            } else {
                btn.addEventListener('click', () => loadContracts(item));
            }

            pagesBox.appendChild(btn);
        });

        firstBtn.disabled = currentPage === 1;
        prevBtn.disabled = currentPage === 1;
        nextBtn.disabled = currentPage === totalPages;
        lastBtn.disabled = currentPage === totalPages;

        firstBtn.onclick = () => loadContracts(1);
        prevBtn.onclick = () => {
            if (currentPage > 1) {
                loadContracts(currentPage - 1);
            }
        };
        nextBtn.onclick = () => {
            if (currentPage < totalPages) {
                loadContracts(currentPage + 1);
            }
        };
        lastBtn.onclick = () => loadContracts(totalPages);

        pageInfo.textContent =
            `Страница ${currentPage} из ${totalPages} • Всего записей: ${contractsState.rowCount}`;

        pagination.style.display = 'flex';
    }

    async function showContractsFragment() {
        const modal = document.getElementById('contracts-modal');

        if (!modal.dataset.loaded) {
            await loadFragment('/fragments/contracts.html', '#contracts-modal');
            modal.dataset.loaded = 'true';

            initContractsSorting();
            initContractsFilters();


            const loadBtn = document.getElementById('load-contracts-btn');
            if (loadBtn) {
                loadBtn.addEventListener('click', () => loadContracts());
            }
        }

        modal.style.display = 'block';
        renderContractsSortHeaders();
        await loadContracts(1);
    }

    function hideContractsFragment() {
        const modal = document.getElementById('contracts-modal');
        modal.style.display = 'none';
        modal.innerHTML = '';
        delete modal.dataset.loaded;
    }

    async function initPage() {
        await loadFragment('/fragments/sidebar.html', '#sidebar-placeholder');
        initSidebarActive();

        const docTypeSelect = document.getElementById('docType');

        docTypeSelect.addEventListener('change', async function () {
            const docType = this.value;

            if (docType === '1') {
                await showContractsFragment();
            } else {
                hideContractsFragment();
            }
        });
    }

    document.addEventListener('DOMContentLoaded', initPage);

    function toggleContractsSort(columnName) {
        const index = contractsState.sortCols.indexOf(columnName);

        if (index === -1) {
            contractsState.sortCols.push(columnName);
            contractsState.sortDirs.push('asc');
        } else {
            contractsState.sortDirs[index] =
                contractsState.sortDirs[index] === 'asc' ? 'desc' : 'asc';
        }

        renderContractsSortHeaders();
        loadContracts(1);
    }

    function removeContractsSort(columnName) {
        const index = contractsState.sortCols.indexOf(columnName);

        if (index === -1) {
            return;
        }

        contractsState.sortCols.splice(index, 1);
        contractsState.sortDirs.splice(index, 1);

        renderContractsSortHeaders();
        loadContracts(1);
    }

    function renderContractsSortHeaders() {
        document.querySelectorAll('#contractsTable th[data-sort-col]').forEach(th => {
            const columnName = th.dataset.sortCol;
            const index = contractsState.sortCols.indexOf(columnName);

            const indicator = th.querySelector('.sort-indicator');
            const priority = th.querySelector('.sort-priority');
            const removeBtn = th.querySelector('.sort-remove-btn');

            th.classList.remove('active-sort', 'sort-asc', 'sort-desc');

            if (index === -1) {
                if (indicator) indicator.textContent = '↕';
                if (priority) {
                    priority.textContent = '';
                    priority.style.visibility = 'hidden';
                }
                if (removeBtn) {
                    removeBtn.style.visibility = 'hidden';
                }
                return;
            }

            const dir = contractsState.sortDirs[index];

            th.classList.add('active-sort');
            th.classList.add(dir === 'asc' ? 'sort-asc' : 'sort-desc');

            if (indicator) {
                indicator.textContent = dir === 'asc' ? '▲' : '▼';
            }

            if (priority) {
                priority.textContent = String(index + 1);
                priority.style.visibility = 'visible';
            }

            if (removeBtn) {
                removeBtn.style.visibility = 'visible';
            }
        });
    }

    function initContractsSorting() {
        document.querySelectorAll('#contractsTable th[data-sort-col]').forEach(th => {
            th.addEventListener('click', () => {
                toggleContractsSort(th.dataset.sortCol);
            });

            const removeBtn = th.querySelector('.sort-remove-btn');
            if (removeBtn) {
                removeBtn.addEventListener('click', (event) => {
                    event.stopPropagation();
                    removeContractsSort(th.dataset.sortCol);
                });
            }
        });

        renderContractsSortHeaders();
    }

    function readContractsFiltersFromInputs() {
        contractsState.filters.id = document.getElementById('filter-id')?.value?.trim() || '';
        contractsState.filters.contractNum = document.getElementById('filter-contract-num')?.value?.trim() || '';
        contractsState.filters.contractDate = document.getElementById('filter-contract-date')?.value || '';
        contractsState.filters.contractorId = document.getElementById('filter-contractor-id')?.value?.trim() || '';
        contractsState.filters.createDttm = document.getElementById('filter-create-dttm')?.value || '';
        contractsState.filters.updateDttm = document.getElementById('filter-update-dttm')?.value || '';
        contractsState.filters.createUserId = document.getElementById('filter-create-user-id')?.value?.trim() || '';
        contractsState.filters.updateUserId = document.getElementById('filter-update-user-id')?.value?.trim() || '';
    }

    function applyContractsFiltersToInputs() {
        const setValue = (id, value) => {
            const el = document.getElementById(id);
            if (el) el.value = value ?? '';
        };

        setValue('filter-id', contractsState.filters.id);
        setValue('filter-contract-num', contractsState.filters.contractNum);
        setValue('filter-contract-date', contractsState.filters.contractDate);
        setValue('filter-contractor-id', contractsState.filters.contractorId);
        setValue('filter-create-dttm', contractsState.filters.createDttm);
        setValue('filter-update-dttm', contractsState.filters.updateDttm);
        setValue('filter-create-user-id', contractsState.filters.createUserId);
        setValue('filter-update-user-id', contractsState.filters.updateUserId);
    }

    function initContractsFilters() {
        const filterIds = [
            'filter-id',
            'filter-contract-num',
            'filter-contract-date',
            'filter-contractor-id',
            'filter-create-dttm',
            'filter-update-dttm',
            'filter-create-user-id',
            'filter-update-user-id'
        ];

        filterIds.forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;

            el.addEventListener('change', () => {
                if (el.dataset.skipNextChange === '1') {
                    el.dataset.skipNextChange = '0';
                    return;
                }

                readContractsFiltersFromInputs();
                loadContracts(1);
            });

            el.addEventListener('keydown', (event) => {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    el.dataset.skipNextChange = '1';
                    readContractsFiltersFromInputs();
                    loadContracts(1);
                }
            });

            el.addEventListener('click', (event) => {
                event.stopPropagation();
            });
        });

        applyContractsFiltersToInputs();
    }

    function renderContractsEmptyRow(text) {
        const table = document.getElementById('contractsTable');
        const tbody = table.querySelector('tbody');

        tbody.innerHTML = `
        <tr class="contracts-empty-row">
            <td colspan="8">${text}</td>
        </tr>
    `;

        table.style.display = 'table';
    }

    function renderContractsErrorRow(text) {
        const table = document.getElementById('contractsTable');
        const tbody = table.querySelector('tbody');

        tbody.innerHTML = `
        <tr class="contracts-empty-row contracts-error-row">
            <td colspan="8">${text}</td>
        </tr>
    `;

        table.style.display = 'table';
    }
</script>
</body>
</html>
