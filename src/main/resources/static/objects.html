<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/layout.css">
    <title>Смета</title>
    <style>
        :root {
            --blue: #9fc5e8;
            --blue-dark: #7ea8cf;
            --line: #6f6f6f;
            --stage-bg: #efefef;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            color: #222;
        }

        .wrap {
            width: 100%;
            padding: 20px;
        }

        h1 {
            margin: 0 0 16px;
            font-size: 22px;
        }

        .table-box {
            background: #fff;
            border: 1px solid var(--line);
            overflow-x: auto;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            min-width: 1200px;
        }

        col.stage-col { width: 240px; }
        col.num-col { width: 60px; }
        col.name-col { width: auto; }
        col.unit-col { width: 90px; }
        col.price-col { width: 120px; }
        col.qty-col { width: 110px; }
        col.sum-col { width: 140px; }

        th, td {
            border: 1px solid var(--line);
            padding: 6px 8px;
            font-size: 13px;
            vertical-align: middle;
            background: var(--white);
        }

        thead th {
            background: var(--blue);
            text-align: center;
            font-weight: 700;
        }

        thead .top-group {
            background: var(--blue);
            font-size: 14px;
        }

        .stage-cell {
            background: var(--stage-bg);
            font-weight: 700;
            text-align: center;
            white-space: pre-line;
            line-height: 1.35;
        }

        .num {
            text-align: center;
        }

        .unit,
        .price,
        .qty,
        .sum {
            text-align: center;
            white-space: nowrap;
        }

        .name {
            text-align: left;
        }

        .subtotal td,
        .stage-total td,
        .global-total td,
        .final-total td {
            background: var(--blue);
            font-weight: 700;
        }

        .subtotal-label,
        .stage-total-label,
        .global-total-label,
        .final-total-label {
            text-align: left;
            padding-left: 12px;
        }

        .sum {
            font-weight: 700;
        }

        .muted {
            font-size: 12px;
            color: #555;
            margin: 10px 0 0;
        }

        .empty {
            padding: 20px;
            background: #fff;
            border: 1px solid var(--line);
        }

        .top-bar {
            padding: 16px 20px 0;
        }

        .top-bar label {
            display: inline-block;
            margin-right: 8px;
            font-size: 14px;
            font-weight: 700;
        }

        .top-bar select {
            min-width: 220px;
            padding: 8px 10px;
            font-size: 14px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #fff;
        }
    </style>
</head>
<body>
<div class="app-layout">
    <div id="sidebar-placeholder"></div>



    <div class="main-area">
        <div class="top-bar">
            <label for="docType">Тип:</label>
            <select id="docType" name="docType">
                <option value="">Выберите тип</option>
                <option value="1">Договор</option>
                <option value="2">Заказчик</option>
            </select>
        </div>
        <div id="contracts-modal" style="display: none;"></div>
    </div>
</div>

<script src="/js/layout.js"></script>
<script>

    async function loadFragment(url, selector) {
        const response = await fetch(url);

        if (!response.ok) {
            throw new Error(`Не удалось загрузить фрагмент: HTTP ${response.status}`);
        }

        const html = await response.text();
        document.querySelector(selector).innerHTML = html;
    }

    async function loadContracts() {
        const pId = document.getElementById('contracts-pId')?.value;
        const pLmt = document.getElementById('contracts-pLmt')?.value || 10;

        let url = `/api/contracts?pLmt=${encodeURIComponent(pLmt)}`;
        if (pId) {
            url += `&pId=${encodeURIComponent(pId)}`;
        }

        const message = document.getElementById('contracts-message');
        const table = document.getElementById('contractsTable');
        const tbody = table.querySelector('tbody');

        message.textContent = 'Загрузка...';
        tbody.innerHTML = '';
        table.style.display = 'none';

        try {
            const response = await fetch(url);

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const contracts = await response.json();

            if (!contracts || contracts.length === 0) {
                message.textContent = 'Контракты не найдены';
                return;
            }

            contracts.forEach(contract => {
                const row = document.createElement('tr');

                row.innerHTML = `
                    <td>${contract.id ?? ''}</td>
                    <td>${contract.contractNum ?? ''}</td>
                    <td>${contract.contractDate ?? ''}</td>
                    <td>${contract.contractorId ?? ''}</td>
                    <td>${contract.createDttm ?? ''}</td>
                    <td>${contract.updateDttm ?? ''}</td>
                    <td>${contract.createUserId ?? ''}</td>
                    <td>${contract.updateUserId ?? ''}</td>
                `;

                tbody.appendChild(row);
            });

            message.textContent = '';
            table.style.display = 'table';
        } catch (error) {
            message.textContent = 'Ошибка загрузки данных: ' + error.message;
        }
    }

    async function showContractsFragment() {
        const modal = document.getElementById('contracts-modal');

        if (!modal.dataset.loaded) {
            await loadFragment('/fragments/contracts.html', '#contracts-modal');
            modal.dataset.loaded = 'true';

            document
                .getElementById('load-contracts-btn')
                .addEventListener('click', loadContracts);
        }

        modal.style.display = 'block';
        await loadContracts();
    }

    function hideContractsFragment() {
        const modal = document.getElementById('contracts-modal');
        modal.style.display = 'none';
        modal.innerHTML = '';
        delete modal.dataset.loaded;
    }

    document.addEventListener('DOMContentLoaded', function () {
        const docTypeSelect = document.getElementById('docType');

        docTypeSelect.addEventListener('change', async function () {
            const docType = this.value;

            if (docType === '1') {
                await showContractsFragment();
            } else {
                hideContractsFragment();
            }
        });
    });
</script>
<script> //todo поправить - пока подсвечивается только Главная
    async function loadFragment(url, selector) {
        const response = await fetch(url);

        if (!response.ok) {
            throw new Error(`Не удалось загрузить фрагмент: HTTP ${response.status}`);
        }

        const html = await response.text();
        document.querySelector(selector).innerHTML = html;
    }

    function initSidebarActive() {
        const currentPage = (window.location.pathname.split('/').pop() || 'index.html').toLowerCase();

        document.querySelectorAll('.sidebar-menu-item').forEach(link => {
            const linkPage = (link.getAttribute('href') || '').split('/').pop().toLowerCase();
            link.classList.toggle('active', linkPage === currentPage);
        });
    }

    async function initPage() {
        await loadFragment('/fragments/sidebar.html', '#sidebar-placeholder');
        initSidebarActive();

        const docTypeSelect = document.getElementById('docType');

        docTypeSelect.addEventListener('change', async function () {
            const docType = this.value;

            if (docType === '1') {
                await showContractsFragment();
            } else {
                hideContractsFragment();
            }
        });
    }

    document.addEventListener('DOMContentLoaded', initPage);
</script>
</body>
</html>
